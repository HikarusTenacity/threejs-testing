<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Editor</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #e8e8e8;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            flex: 1;
            background: #0a0a0a;
            position: relative;
        }

        #gameContainer canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .editor-panel {
            width: 320px;
            background: #222;
            border-left: 2px solid #00ff00;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section {
            border: 1px solid #333;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 4px;
        }

        .section-title {
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: #aaa;
        }

        input[type="range"],
        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 6px;
            background: #333;
            border: 1px solid #555;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            border-radius: 2px;
        }

        input[type="range"] {
            padding: 0;
            height: 24px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
        }

        .value-display {
            display: inline-block;
            background: #444;
            padding: 2px 6px;
            border-radius: 2px;
            margin-left: 4px;
            color: #0f0;
            font-size: 11px;
        }

        button {
            padding: 8px 12px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 2px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        button:hover {
            background: #00cc00;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: #444;
            color: #0f0;
            border: 1px solid #0f0;
        }

        button.secondary:hover {
            background: #555;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .status {
            background: #2a2a2a;
            padding: 8px;
            border-radius: 2px;
            font-size: 11px;
            color: #888;
            border-left: 3px solid #00ff00;
        }

        .status.active {
            border-left-color: #ffff00;
            color: #ffff00;
        }

        .preset-btn {
            padding: 6px 8px;
            font-size: 11px;
            flex: 1;
        }

        .preset-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #00ff00;
            font-size: 13px;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff3333;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            z-index: 1000;
        }

        .close-btn:hover {
            background: #cc0000;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .info-text {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <button class="close-btn" onclick="closeEditor()">Close Editor</button>
    </div>

    <div class="editor-panel">
        <div class="section">
            <div class="section-title">Game Status</div>
            <div id="statusDisplay" class="status">
                Loading...
            </div>
        </div>

        <!-- IDLE ANIMATIONS -->
        <div class="section">
            <div class="section-title">Idle Animations</div>
            
            <div class="control-group">
                <label>Base Speed: <span class="value-display" id="idleSpeedDisplay">1.0</span></label>
                <input type="range" id="idleSpeed" min="0.1" max="3" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Sway Amount: <span class="value-display" id="swayAmountDisplay">0.15</span></label>
                <input type="range" id="swayAmount" min="0" max="0.4" step="0.02" value="0.15">
            </div>

            <div class="control-group">
                <label>Head Bob: <span class="value-display" id="headBobDisplay">0.08</span></label>
                <input type="range" id="headBob" min="0" max="0.2" step="0.01" value="0.08">
            </div>

            <button class="secondary" onclick="resetIdlePhases()">Reset Phases</button>
            <p class="info-text">Resets idle animation phases for all pieces</p>
        </div>

        <!-- PLAYER WALK -->
        <div class="section">
            <div class="section-title">Player Walk</div>
            
            <div class="control-group">
                <label>Player #</label>
                <select id="playerSelect">
                    <option value="0">Piece 1 (Red)</option>
                    <option value="1">Piece 2 (Green)</option>
                    <option value="2">Piece 3 (Blue)</option>
                    <option value="3">Piece 4 (Yellow)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Target Space: <span class="value-display" id="spaceDisplay">5</span></label>
                <input type="range" id="targetSpace" min="0" max="40" step="1" value="5">
            </div>

            <div class="control-group">
                <label>Duration (ms): <span class="value-display" id="durationDisplay">2000</span></label>
                <input type="range" id="walkDuration" min="500" max="5000" step="100" value="2000">
            </div>

            <div class="control-group">
                <label>Speed Multiplier: <span class="value-display" id="walkSpeedDisplay">1.0</span></label>
                <input type="range" id="walkSpeed" min="0.3" max="3" step="0.1" value="1">
            </div>

            <div class="preset-group">
                <button class="preset-btn" onclick="walkToSpace(3)">→ Space 3</button>
                <button class="preset-btn" onclick="walkToSpace(10)">→ Space 10</button>
            </div>
            <div class="preset-group">
                <button class="preset-btn" onclick="walkToSpace(20)">→ Space 20</button>
                <button class="preset-btn" onclick="walkToSpace(35)">→ Space 35</button>
            </div>

            <button onclick="startPlayerWalk()">Start Walk</button>
        </div>

        <!-- DICE ROLL -->
        <div class="section">
            <div class="section-title">Dice Roll</div>
            
            <div class="control-group">
                <label>Roll Speed: <span class="value-display" id="diceSpeedDisplay">1.0</span></label>
                <input type="range" id="diceSpeed" min="0.3" max="2.5" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Roll Duration (ms): <span class="value-display" id="rollDurationDisplay">1200</span></label>
                <input type="range" id="rollDuration" min="600" max="2400" step="100" value="1200">
            </div>

            <div class="control-group">
                <label>Spin Amount: <span class="value-display" id="spinDisplay">15</span></label>
                <input type="range" id="spinAmount" min="5" max="30" step="1" value="15">
            </div>

            <div class="preset-group">
                <button class="preset-btn" onclick="rollDice(0.5)">🐢 Slow</button>
                <button class="preset-btn" onclick="rollDice(1)">⚡ Normal</button>
            </div>
            <div class="preset-group">
                <button class="preset-btn" onclick="rollDice(1.5)">⚡⚡ Fast</button>
                <button class="preset-btn" onclick="rollDice(2)">⚡⚡⚡ Very Fast</button>
            </div>

            <button onclick="startDiceRoll()">Roll Dice</button>
        </div>

        <!-- ENVIRONMENT -->
        <div class="section">
            <div class="section-title">Environment</div>
            
            <div class="control-group">
                <label>Tree Sway: <span class="value-display" id="treeSwayDisplay">1.0</span></label>
                <input type="range" id="treeSway" min="0" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Cloud Speed: <span class="value-display" id="cloudSpeedDisplay">1.0</span></label>
                <input type="range" id="cloudSpeed" min="0" max="2" step="0.1" value="1">
            </div>

            <button class="secondary" onclick="toggleEnvironmentAnimation()">Toggle Animation</button>
        </div>

        <!-- RESET -->
        <div class="section">
            <div class="section-title">Controls</div>
            <button onclick="resetAll()">Reset All</button>
            <button class="secondary" onclick="reloadGame()">Reload Game</button>
        </div>
    </div>

    <script src="three.min.js"></script>
    <script src="game.bundle.js"></script>
    <script>
        // Global animation editor state
        const editor = {
            gameLoaded: false,
            gameManager: null,
            pieces: [],
            diceAnimator: null,
            environmentAnimating: true
        };

        // Initialize UI value displays
        function initializeDisplays() {
            document.getElementById('idleSpeedDisplay').textContent = 
                document.getElementById('idleSpeed').value;
            document.getElementById('swayAmountDisplay').textContent = 
                document.getElementById('swayAmount').value;
            // ... repeat for other controls
        }

        // Setup slider value displays
        function setupSliderDisplays() {
            const sliders = {
                'idleSpeed': 'idleSpeedDisplay',
                'swayAmount': 'swayAmountDisplay',
                'headBob': 'headBobDisplay',
                'targetSpace': 'spaceDisplay',
                'walkDuration': 'durationDisplay',
                'walkSpeed': 'walkSpeedDisplay',
                'diceSpeed': 'diceSpeedDisplay',
                'rollDuration': 'rollDurationDisplay',
                'spinAmount': 'spinDisplay',
                'treeSway': 'treeSwayDisplay',
                'cloudSpeed': 'cloudSpeedDisplay'
            };

            Object.entries(sliders).forEach(([sliderId, displayId]) => {
                const slider = document.getElementById(sliderId);
                const display = document.getElementById(displayId);
                if (slider && display) {
                    slider.addEventListener('input', (e) => {
                        display.textContent = parseFloat(e.target.value).toFixed(2);
                        onSliderChange(sliderId, e.target.value);
                    });
                }
            });
        }

        // Handle slider value changes
        function onSliderChange(sliderId, value) {
            const val = parseFloat(value);
            
            // Apply to game parameters if loaded
            if (!editor.gameLoaded) return;

            switch(sliderId) {
                case 'idleSpeed':
                    // Scale all idle animations
                    editor.pieces.forEach(p => {
                        p.userData.idleSpeedMultiplier = val;
                    });
                    break;
                case 'swayAmount':
                    editor.pieces.forEach(p => {
                        p.userData.bodySwayAmount = val;
                    });
                    break;
                case 'walkSpeed':
                    if (window.playerAnimator) {
                        window.playerAnimator.setSpeedMultiplier(val);
                    }
                    break;
                case 'diceSpeed':
                    if (window.diceAnimator) {
                        window.diceAnimator.setSpeedMultiplier(val);
                    }
                    break;
                case 'treeSway':
                    document.body.style.setProperty('--tree-sway-mult', val);
                    break;
                case 'cloudSpeed':
                    if (window.cloudSpeed !== undefined) {
                        window.cloudSpeed = val;
                    }
                    break;
            }
        }

        // Player walk test
        function startPlayerWalk() {
            if (!editor.gameLoaded) {
                alert('Game not loaded yet');
                return;
            }
            const playerIdx = parseInt(document.getElementById('playerSelect').value);
            const targetSpace = parseInt(document.getElementById('targetSpace').value);
            const speed = parseFloat(document.getElementById('walkSpeed').value);

            console.log(`Testing walk: Player ${playerIdx} to Space ${targetSpace} at ${speed}x speed`);
            if (window.testAnimations && window.testAnimations.playPlayerWalk) {
                window.testAnimations.playPlayerWalk(playerIdx, targetSpace);
                if (window.playerAnimator) {
                    window.playerAnimator.setSpeedMultiplier(speed);
                }
            }
            
            updateStatus('Walking to space ' + targetSpace, true);
        }

        function walkToSpace(spaceNum) {
            document.getElementById('targetSpace').value = spaceNum;
            document.getElementById('spaceDisplay').textContent = spaceNum;
            startPlayerWalk();
        }

        // Dice roll test
        function startDiceRoll() {
            if (!editor.gameLoaded) {
                alert('Game not loaded yet');
                return;
            }
            const speed = parseFloat(document.getElementById('diceSpeed').value);
            console.log(`Rolling dice at ${speed}x speed`);
            
            if (window.testAnimations && window.testAnimations.rollDice) {
                window.testAnimations.rollDice(speed);
            }
            
            updateStatus('Rolling dice', true);
        }

        function rollDice(speed) {
            document.getElementById('diceSpeed').value = speed;
            document.getElementById('diceSpeedDisplay').textContent = speed.toFixed(2);
            startDiceRoll();
        }

        // Reset animations
        function resetIdlePhases() {
            if (!editor.gameLoaded) return;
            editor.pieces.forEach((piece, i) => {
                piece.userData.idlePhase = Math.random() * Math.PI * 2;
            });
            updateStatus('Idle phases reset', true);
        }

        function toggleEnvironmentAnimation() {
            editor.environmentAnimating = !editor.environmentAnimating;
            document.body.style.setProperty('--env-paused', editor.environmentAnimating ? '0' : '1');
            updateStatus(editor.environmentAnimating ? 'Environment animating' : 'Environment paused', true);
        }

        function resetAll() {
            location.reload();
        }

        function reloadGame() {
            location.reload();
        }

        // Status display
        function updateStatus(message, active = false) {
            const status = document.getElementById('statusDisplay');
            status.textContent = message;
            status.classList.toggle('active', active);
        }

        // Export test API
        function exposeTestAPI() {
            window.testAnimations = {
                setIdleParams: function(params) {
                    if (params.speed !== undefined) {
                        document.getElementById('idleSpeed').value = params.speed;
                    }
                    if (params.amount !== undefined) {
                        document.getElementById('swayAmount').value = params.amount;
                    }
                },
                playPlayerWalk: function(playerIdx, targetSpace) {
                    if (!window.GAME_STATE) return;
                    const pieces = window.GAME_STATE.pieces;
                    if (pieces && pieces[playerIdx]) {
                        const animator = createPlayerAnimator(pieces[playerIdx], targetSpace);
                        animator.init();
                        editor.pieces = pieces;
                        updateStatus('Walking...', true);
                    }
                },
                rollDice: function(speed) {
                    if (!window.GAME_STATE) return;
                    if (window.GAME_STATE.diceAnimator) {
                        window.GAME_STATE.diceAnimator.setSpeedMultiplier(speed || 1);
                        console.log('Dice rolling at', speed, 'x speed');
                        updateStatus('Rolling...', true);
                    }
                }
            };
        }

        function closeEditor() {
            if (confirm('Close animation editor and return to game?')) {
                window.location.href = '/';
            }
        }

        // Wait for game to load
        function checkGameLoaded() {
            if (window.GAME_STATE || window.pieces) {
                editor.gameLoaded = true;
                editor.pieces = window.pieces || [];
                editor.diceAnimator = window.diceAnimator;
                updateStatus('Game loaded. Ready to test.', true);
                exposeTestAPI();
                console.log('Animation Editor Ready', {
                    pieces: editor.pieces.length,
                    diceAnimator: !!editor.diceAnimator
                });
            } else {
                setTimeout(checkGameLoaded, 100);
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            setupSliderDisplays();
            initializeDisplays();
            updateStatus('Loading game...', false);
            checkGameLoaded();
        });
    </script>
</body>
</html>
