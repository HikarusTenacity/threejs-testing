<script>
// Set this URL (or localStorage key "kurokaneFontUrl") to dynamically load Kurokane.
window.__KUROKANE_FONT_URL__ = window.__KUROKANE_FONT_URL__ || 'assets/fonts/Kurokane.woff2';

(function loadKurokaneDynamically() {
    var fontUrl = window.__KUROKANE_FONT_URL__ || localStorage.getItem('kurokaneFontUrl') || '';
    if (!fontUrl || !window.FontFace || !document.fonts) {
        return;
    }

    var kurokaneFace = new FontFace('Kurokane', 'url(' + fontUrl + ')');
    kurokaneFace.load().then(function(loadedFace) {
        document.fonts.add(loadedFace);
        document.documentElement.classList.add('kurokane-loaded');
    }).catch(function(error) {
        console.warn('Failed to load Kurokane font:', error);
    });
})();
</script>
<style>
@font-face {
font-family: 'Kurokane';
src: local('Kurokane');
font-display: swap;
}

:root {
--ui-font: 'Kurokane', 'Impact', 'Arial Black', sans-serif;
--content-font: 'Avenir Next', 'Avenir', 'Segoe UI', sans-serif;
--game-font: var(--ui-font);

/* Lofi text tuning: edit these values only */
--lofi-text-downscale-static: 1;
--lofi-text-upscale-static: 1;
--lofi-text-blur-static: 0px;
--lofi-text-blur-controls: 0px;
}

body.retro-ui #info,
body.retro-ui #turnDisplay,
body.retro-ui .player-corner,
body.retro-ui .name-overlay,
body.retro-ui .title-screen-overlay,
body.retro-ui .title-rules-modal,
body.retro-ui .credits-overlay,
body.retro-ui .credits-panel,
body.retro-ui .settings-overlay,
body.retro-ui .settings-panel {
font-smooth: never;
-webkit-font-smoothing: none;
-moz-osx-font-smoothing: grayscale;
text-rendering: optimizeSpeed;
}

/* Downscale then upscale static text blocks to mimic low-resolution rasterized text. */
body.retro-ui .name-title,
body.retro-ui .name-message,
body.retro-ui .name-controls,
body.retro-ui .title-screen-logo,
body.retro-ui .title-screen-subtitle,
body.retro-ui .title-screen-controls,
body.retro-ui .title-rules-title,
body.retro-ui .title-rules-text,
body.retro-ui .credits-title,
body.retro-ui .credits-line,
body.retro-ui .credits-line-strong,
body.retro-ui .settings-title,
body.retro-ui .settings-label,
body.retro-ui .settings-value-label,
body.retro-ui .toggle-label {
zoom: var(--lofi-text-downscale-static);
transform: scale(var(--lofi-text-upscale-static));
transform-origin: center;
filter: blur(var(--lofi-text-blur-static));
}

/* Keep transform-heavy controls functional while softening text fidelity. */
body.retro-ui .name-slot,
body.retro-ui .name-key,
body.retro-ui .name-key-delete,
body.retro-ui .title-screen-start,
body.retro-ui .title-rules-close,
body.retro-ui .credits-close-btn,
body.retro-ui .settings-option-btn,
body.retro-ui .settings-button,
body.retro-ui #info,
body.retro-ui #turnDisplay,
body.retro-ui .player-corner {
filter: blur(var(--lofi-text-blur-controls));
}

/* Keep key action controls readable in retro mode. */
body.retro-ui .name-confirm,
body.retro-ui .title-screen-start,
body.retro-ui .title-rules-close,
body.retro-ui .credits-close-btn,
body.retro-ui .settings-button,
body.retro-ui .settings-option-btn {
filter: none;
}

html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
.retro-canvas {
image-rendering: pixelated;
transform-origin: center;
}

.retro-screen-overlay {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 110;
mix-blend-mode: multiply;
overflow: hidden;
background:
repeating-linear-gradient(
to bottom,
rgba(0, 0, 0, 0.21) 0px,
rgba(0, 0, 0, 0.21) 2px,
rgba(255, 255, 255, 0.02) 3px,
rgba(255, 255, 255, 0.02) 4px
),
radial-gradient(circle at center, transparent 48%, rgba(0, 0, 0, 0.58) 100%);
opacity: 0.58;
}

.retro-screen-overlay::before,
.retro-screen-overlay::after {
content: '';
position: absolute;
left: 0;
right: 0;
pointer-events: none;
}

/* Slow rolling scan-wave texture like CRT interference bands. */
.retro-screen-overlay::before {
top: -35%;
bottom: -35%;
opacity: 0.24;
background: repeating-linear-gradient(
to bottom,
rgba(255, 255, 255, 0.08) 0px,
rgba(255, 255, 255, 0.08) 2px,
rgba(0, 0, 0, 0) 8px,
rgba(0, 0, 0, 0) 18px,
rgba(0, 0, 0, 0.09) 22px,
rgba(0, 0, 0, 0.09) 24px
);
filter: blur(0.7px);
mix-blend-mode: screen;
animation: crtWaveRoll 10.5s linear infinite;
}

/* Horizontal brightness wave sweeping down the screen. */
.retro-screen-overlay::after {
top: -120%;
height: 140%;
opacity: 0.2;
background: linear-gradient(
to bottom,
transparent 0%,
rgba(255, 255, 255, 0.14) 46%,
rgba(255, 255, 255, 0.04) 56%,
transparent 72%
);
animation: crtBandSweep 8.6s ease-in-out infinite;
}

@keyframes crtWaveRoll {
0% {
transform: translateY(-18%) skewX(0deg);
}
50% {
transform: translateY(8%) skewX(0.55deg);
}
100% {
transform: translateY(36%) skewX(-0.4deg);
}
}

@keyframes crtBandSweep {
0% {
transform: translateY(-95%);
}
50% {
transform: translateY(25%);
}
100% {
transform: translateY(130%);
}
}
